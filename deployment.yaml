apiVersion: v1
kind: Namespace
metadata:
  name: notary-prod

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notary-api
  namespace: notary-prod
  labels:
    app: notary-api
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notary-api
  template:
    metadata:
      labels:
        app: notary-api
        version: v1
    spec:
      serviceAccountName: notary-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: notary-api
        image: us-central1-docker.pkg.dev/PROJECT_ID/notary-repository/notary-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: notary-secrets
              key: database-url
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: notary-config
              key: allowed-origins
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-data
          mountPath: /app/data
      volumes:
      - name: tmp
        emptyDir: {}
      - name: app-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: notary-api
  namespace: notary-prod
  labels:
    app: notary-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: notary-api

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notary-api
  namespace: notary-prod

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notary-config
  namespace: notary-prod
data:
  allowed-origins: "https://notarialsolutions.com,https://www.notarialsolutions.com"

---
apiVersion: v1
kind: Secret
metadata:
  name: notary-secrets
  namespace: notary-prod
type: Opaque
stringData:
  database-url: "postgresql://user:OaklandP69@cloudsql-proxy:5432/notary_db"
