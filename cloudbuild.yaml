steps:
  # Step 1: Build the image with both tags using Artifact Registry paths
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    env:
      - 'DOCKER_BUILDKIT=1'
    args: 
      - 'build'
      - '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/notary-repository/notary-api:$SHORT_SHA'
      - '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/notary-repository/notary-api:latest'
      - '.'

  # Step 2: Push the SHA tagged image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/notary-repository/notary-api:$SHORT_SHA'

  # Step 3: Push the latest tagged image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/notary-repository/notary-api:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/://google.com'
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'notary-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/notary-repository/notary-api:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      
  # Steps 5:
  - name: 'ubuntu'
    script: 'pwd'

# Images block registers the output images with Cloud Build tracking
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/notary-repository/notary-api:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/notary-repository/notary-api:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  timeout: '3600s'
