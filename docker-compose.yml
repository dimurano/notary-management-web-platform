version: '3.9'

services:
  api:
    build: .
    container_name: notary-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///./notary_journal.db
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
      - ENVIRONMENT=development
    volumes:
      - ./notary_journal.db:/app/notary_journal.db
      - ./:/app
    develop:
      watch:
        - path: ./main.py
          action: sync
        - path: ./models.py
          action: sync
        - path: ./requirements.txt
          action: rebuild
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

